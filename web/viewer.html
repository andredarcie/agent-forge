<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AgentForge PSX</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='1' y='13' font-size='13'>⚒</text></svg>">
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js",
        "three/addons/": "/node_modules/three/examples/jsm/",
        "three-mesh-bvh": "/node_modules/three-mesh-bvh/build/index.module.js",
        "three-bvh-csg": "/node_modules/three-bvh-csg/build/index.module.js"
      }
    }
  </script>
  <style>
    :root {
      --bg: #12161c;
      --panel: #1a2028e6;
      --border: #2b3442;
      --text: #dbe4f0;
      --dim: #8b9bb3;
      --accent: #58a6ff;
      --warn: #e0c184;
      --err: #ff7b7b;
      --ok: #7ece8f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
    #canvas-host { position: absolute; inset: 0; }
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; height: 46px;
      display: flex; align-items: center; gap: 10px; padding: 0 14px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px); color: var(--text); z-index: 10;
    }
    #topbar .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 14px; }
    #topbar .logo span { color: var(--accent); }
    select, button {
      background: #232c38; color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    button:hover, select:hover { border-color: var(--accent); }
    button.active { background: var(--accent); color: #0c1116; border-color: var(--accent); }
    #status { margin-left: auto; font-size: 12px; color: var(--dim); }
    #panel {
      position: absolute; top: 56px; right: 10px; width: 340px; max-height: calc(100% - 76px);
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 12px; overflow-y: auto; z-index: 10;
      backdrop-filter: blur(8px);
    }
    #panel h3 {
      margin: 0; padding: 9px 14px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--dim); border-bottom: 1px solid var(--border);
    }
    #panel section { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    #panel section:last-child { border-bottom: none; }
    .kv { display: flex; justify-content: space-between; padding: 2px 0; }
    .kv b { color: var(--dim); font-weight: 500; }
    #tree { font-family: Consolas, monospace; font-size: 11px; white-space: pre; color: #a9b8cd; line-height: 1.5; overflow-x: auto; }
    .issue { padding: 4px 0; line-height: 1.4; }
    .issue.warn { color: var(--warn); }
    .issue.error { color: var(--err); }
    .issue.info { color: var(--dim); }
    .issue.ok { color: var(--ok); }
    #error-overlay {
      position: absolute; inset: 60px 20px auto 20px; z-index: 20; display: none;
      background: #2a1518f2; border: 1px solid #6e2a2a; border-radius: 10px;
      color: #ffbdbd; padding: 16px 20px; font-family: Consolas, monospace;
      font-size: 12px; white-space: pre-wrap; max-height: 70%; overflow: auto;
    }
    #hint { position: absolute; bottom: 10px; left: 14px; color: #5c6b80; font-size: 11px; z-index: 5; }
  </style>
</head>
<body>
  <div id="canvas-host"></div>
  <div id="topbar">
    <div class="logo">Agent<span>Forge</span> PSX</div>
    <select id="model-select"></select>
    <button id="btn-reload" title="Reload model">Reload</button>
    <button id="btn-psx" class="active" title="Toggle PSX effects: dither, vertex snap, affine textures (X)">PSX</button>
    <button id="btn-wire" title="Toggle wireframe (W)">Wireframe</button>
    <button id="btn-grid" class="active" title="Toggle grid (G)">Grid</button>
    <button id="btn-shot" title="Save screenshot to renders/ (P)">Screenshot</button>
    <div id="status">connecting…</div>
  </div>
  <div id="panel">
    <h3>Model data</h3>
    <section id="sec-stats"></section>
    <h3>Issues</h3>
    <section id="sec-issues"></section>
    <h3>Structure</h3>
    <section><div id="tree"></div></section>
  </div>
  <div id="error-overlay"></div>
  <div id="hint">drag: orbit &nbsp;•&nbsp; shift+drag: pan &nbsp;•&nbsp; scroll: zoom &nbsp;•&nbsp; W wireframe &nbsp;•&nbsp; P screenshot — edits to models/*.js hot-reload</div>
  <script type="module" src="/web/viewer.js"></script>
</body>
</html>
